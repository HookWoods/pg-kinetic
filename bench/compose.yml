services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: pgkinetic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "55432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgkinetic"]
      interval: 2s
      timeout: 2s
      retries: 30

  pgbouncer:
    profiles: [comparison]
    image: edoburu/pgbouncer:v1.25.2-p0
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "56432:5432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro

  pgdog:
    profiles: [comparison]
    image: ghcr.io/pgdogdev/pgdog:v0.1.46
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "57432:6432"
    volumes:
      - ./pgdog/pgdog.toml:/pgdog/pgdog.toml:ro
      - ./pgdog/users.toml:/pgdog/users.toml:ro
    environment:
      RUST_LOG: info

  pg-kinetic:
    build:
      context: ..
      args:
        PG_KINETIC_BENCH_RUSTFLAGS: ${PG_KINETIC_BENCH_RUSTFLAGS:-}
      dockerfile_inline: |
        FROM rust:1.88-bookworm AS builder
        ARG PG_KINETIC_BENCH_RUSTFLAGS
        ENV RUSTFLAGS=$$PG_KINETIC_BENCH_RUSTFLAGS
        WORKDIR /src
        COPY . .
        RUN cargo build --release -p pg-kinetic
        FROM debian:bookworm-slim
        COPY --from=builder /src/target/release/pg-kinetic /usr/local/bin/pg-kinetic
        EXPOSE 6543
        ENTRYPOINT ["/usr/local/bin/pg-kinetic"]
    entrypoint:
      - /bin/sh
      - -ec
      - |
        backend_ip="$$(getent hosts postgres | awk 'NR==1 { print $1 }')"
        exec /usr/local/bin/pg-kinetic \
          --listen-addr "$${PG_KINETIC_LISTEN_ADDR:-0.0.0.0:6543}" \
          --backend-addr "$${backend_ip}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "58432:6543"
      - "59091:9091"
      - "19090:9090"
    environment:
      PG_KINETIC_RUNTIME_ENGINE: tokio_default
      PG_KINETIC_LISTEN_ADDR: "0.0.0.0:6543"
      PG_KINETIC_BACKEND_ADDR: "postgres:5432"
      PG_KINETIC_METRICS_ADDR: "0.0.0.0:9090"
      PG_KINETIC_PHASE_TIMING_SAMPLE_RATE: "${PG_KINETIC_PHASE_TIMING_SAMPLE_RATE:-1.0}"
      PG_KINETIC_HEALTH_ADDR: "0.0.0.0:9091"
      PG_KINETIC_AUTH_MODE: trust
      PG_KINETIC_AUTH_USERS_FILE: /etc/pg-kinetic/auth-users.txt
      PG_KINETIC_BACKEND_USER: postgres
      PG_KINETIC_BACKEND_PASSWORD_ENV_VAR_NAME: PG_KINETIC_BACKEND_PASSWORD
      PG_KINETIC_BACKEND_PASSWORD: postgres
      PG_KINETIC_MAX_BACKENDS: "8"
      RUST_LOG: info
    volumes:
      - ./pg-kinetic/auth-users.txt:/etc/pg-kinetic/auth-users.txt:ro
