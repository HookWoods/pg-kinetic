[package]
name = "pg-kinetic"
version = "0.1.0"
edition.workspace = true
license.workspace = true
readme.workspace = true

[dependencies]
anyhow = "1"
pg-kinetic-core = { path = "../pg-kinetic-core" }
pg-kinetic-proxy = { path = "../pg-kinetic-proxy" }
pg-kinetic-wire = { path = "../pg-kinetic-wire" }
tokio = { version = "1", features = ["full"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }

[dev-dependencies]
bytes = "1"
pretty_assertions = "1"

[lints]
workspace = true
