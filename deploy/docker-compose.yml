services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pgkinetic
      POSTGRES_PASSWORD: pgkinetic
      POSTGRES_DB: pgkinetic
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgkinetic -d pgkinetic"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      pg-kinetic-net:
        ipv4_address: 172.30.0.10

  pg-kinetic:
    build:
      context: ..
      dockerfile: Dockerfile
    image: pg-kinetic:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --config-file
      - /etc/pg-kinetic/pg-kinetic.toml
    ports:
      - "6432:6432"
      - "7000:7000"
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./pg-kinetic.toml:/etc/pg-kinetic/pg-kinetic.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      pg-kinetic-net:
        ipv4_address: 172.30.0.20

networks:
  pg-kinetic-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
