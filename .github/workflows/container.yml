name: Container

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version
        id: image
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          else
            version="edge"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build and publish container images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/hookwoods/pg-kinetic:${{ steps.image.outputs.version }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=container-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=container-${{ matrix.suffix }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hookwoods/pg-kinetic
          flavor: latest=false
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Resolve image version
        id: image
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
          else
            version="edge"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish multi-arch manifest
        shell: bash
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && tag_args+=("-t" "$tag")
          done <<'EOF'
          ${{ steps.meta.outputs.tags }}
          EOF

          docker buildx imagetools create "${tag_args[@]}" \
            ghcr.io/hookwoods/pg-kinetic:${{ steps.image.outputs.version }}-amd64 \
            ghcr.io/hookwoods/pg-kinetic:${{ steps.image.outputs.version }}-arm64
