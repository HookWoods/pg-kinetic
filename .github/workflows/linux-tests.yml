name: Linux tests

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]
        go: [stable]
        node: [22]
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Start local PostgreSQL stack
        run: docker compose -f bench/compose.yml up --detach --wait --build postgres pg-kinetic
      - name: Run Linux checks
        run: cargo run -p xtask -- ci-linux
      - name: Stop local PostgreSQL stack
        if: always()
        run: docker compose -f bench/compose.yml down --volumes
