name: Linux tests

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "charts/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/container.yml"
      - ".github/workflows/helm.yml"
      - "README.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "docs-site/**"
      - "charts/**"
      - ".github/workflows/docs.yml"
      - ".github/workflows/container.yml"
      - ".github/workflows/helm.yml"
      - "README.md"

permissions:
  contents: read

concurrency:
  group: linux-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install --yes postgresql-client
      - name: Start local PostgreSQL stack
        run: |
          docker compose -f bench/compose.yml down --volumes --remove-orphans
          docker compose -f bench/compose.yml up --detach --wait --build postgres pg-kinetic
      - name: Verify proxy query path
        run: docker compose -f bench/compose.yml exec -T postgres env PGPASSWORD=postgres psql -v ON_ERROR_STOP=1 -h pg-kinetic -p 6543 -U postgres -d pgkinetic -c 'select 1'
      - name: Run Linux checks
        run: cargo run -p xtask -- ci-linux
      - name: Upload Linux Compose logs
        if: failure()
        run: |
          mkdir -p target/release-evidence/linux
          docker compose -f bench/compose.yml logs --no-color --timestamps pg-kinetic postgres \
            | tee target/release-evidence/linux/compose.log
      - name: Publish Linux failure evidence
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: linux-compose-evidence
          path: target/release-evidence/linux
          if-no-files-found: error
      - name: Stop local PostgreSQL stack
        if: always()
        run: docker compose -f bench/compose.yml down --volumes
