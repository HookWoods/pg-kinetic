name: Helm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing GitHub release tag to publish, for example v0.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: azure/setup-helm@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Resolve release version
        id: version
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH, got: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Align chart metadata
        run: |
          version="${{ steps.version.outputs.version }}"
          sed -i -E "s/^version: .*/version: ${version}/" charts/pg-kinetic/Chart.yaml
          sed -i -E "s/^appVersion: .*/appVersion: \"${version}\"/" charts/pg-kinetic/Chart.yaml

      - name: Run chart tests
        run: helm lint charts/pg-kinetic

      - name: Ensure Helm Pages branch
        run: |
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            exit 0
          fi

          pages_dir="$(mktemp -d)"
          git worktree add --detach "$pages_dir"
          cd "$pages_dir"
          git checkout --orphan gh-pages
          git rm -rf .
          printf 'helm.pgkinetic.dev\n' > CNAME
          cat > index.yaml <<'EOF'
          apiVersion: v1
          entries: {}
          generated: "1970-01-01T00:00:00Z"
          EOF
          git add CNAME index.yaml
          git commit -m "chore: initialize helm pages"
          git push origin HEAD:gh-pages
          cd -
          git worktree remove "$pages_dir"
          git fetch origin gh-pages

      - name: Package chart
        run: |
          mkdir -p .cr-release-packages
          helm package charts/pg-kinetic \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}" \
            --destination .cr-release-packages

      - name: Upload chart asset to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            ".cr-release-packages/pg-kinetic-${{ steps.version.outputs.version }}.tgz" \
            --clobber

      - name: Install chart releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          config: charts/cr.yaml
          install_only: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update chart repository index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cr index \
            --owner hookwoods \
            --git-repo pg-kinetic \
            --config charts/cr.yaml \
            --token "$CR_TOKEN" \
            --push

      - name: Configure Helm Pages domain
        run: |
          git fetch origin gh-pages || true
          rm -rf /tmp/pg-kinetic-helm-pages
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/pg-kinetic-helm-pages origin/gh-pages
          else
            git worktree add --detach /tmp/pg-kinetic-helm-pages
            cd /tmp/pg-kinetic-helm-pages
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          cd /tmp/pg-kinetic-helm-pages
          printf 'helm.pgkinetic.dev\n' > CNAME
          git add CNAME
          if ! git diff --cached --quiet; then
            git commit -m "chore: set helm pages domain"
            git push origin HEAD:gh-pages
          fi
